<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Sender</title>
    <script src="qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #181715;
            --surface:     #211F1C;
            --surface-alt: #2A2724;
            --border:      #3A3631;
            --accent:      #6FA3A7;
            --accent-h:    #84B5B8;
            --success:     #7FB07A;
            --warning:     #D3A25F;
            --danger:      #D07A89;
            --text:        #E8E2DA;
            --muted:       #AEA79E;
            --mono:        'Consolas', 'Cascadia Code', monospace;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px;
            gap: 14px;
        }

        header { text-align: center; }
        header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .06em; }
        header p  { font-size: .7rem; color: var(--muted); margin-top: 3px; }

        .card {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 10px 12px;
            resize: vertical;
            outline: none;
            transition: border-color .15s;
        }
        textarea:focus { border-color: var(--accent); }

        .controls {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
        }

        input[type="number"] {
            width: 76px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            padding: 6px 10px;
            outline: none;
        }

        .check-field {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-bottom: 1px;
            font-size: .75rem;
            color: var(--muted);
            cursor: pointer;
        }

        .btns { display: flex; gap: 8px; margin-left: auto; }

        button {
            padding: 6px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            border: none;
        }
        #playBtn { background: var(--accent); color: #0c1a1c; }
        #playBtn:hover { background: var(--accent-h); }
        #stopBtn { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        button:disabled { opacity: .3; cursor: not-allowed; }

        .qr-wrap {
            width: 100%;
            max-width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--border);
            border-radius: 8px;
            transition: border-color .2s, background .2s;
            position: relative;
        }
        .qr-wrap.active {
            border-style: solid;
            border-color: var(--accent);
            background: rgba(111, 163, 167, .05);
        }

        #placeholder { color: var(--muted); font-size: .8rem; }
        #qrcode {
            display: none;
            background: #fff;
            padding: 24px;
            border-radius: 6px;
        }
        #qrcode img, #qrcode canvas { display: block; }

        .progress {
            width: 100%;
            max-width: 500px;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width .2s;
        }

        .foot {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            font-size: .72rem;
            color: var(--muted);
            min-height: 1em;
        }
        #chunkInfo { font-family: var(--mono); color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>QR SENDER</h1>
        <p>AirGap Transfer &mdash; Ctrl+Enter to start</p>
    </header>

    <div class="card">
        <textarea id="textInput" placeholder="Paste payload here…"></textarea>
    </div>

    <div class="card">
        <div class="controls">
            <div class="field">
                <label for="chunkSize">Chunk</label>
                <input type="number" id="chunkSize" value="200" min="50" max="800">
            </div>
            <div class="field">
                <label for="displayTime">Speed ms</label>
                <input type="number" id="displayTime" value="500" min="100" max="5000" step="50">
            </div>
            <label class="check-field">
                <input type="checkbox" id="compressEnabled">
                Compress
            </label>
            <div class="btns">
                <button id="playBtn">▶ Start</button>
                <button id="stopBtn" disabled>⏹ Stop</button>
            </div>
        </div>
    </div>

    <div class="qr-wrap" id="qrDisplay">
        <span id="placeholder">📷 QR codes will appear here</span>
        <div id="qrcode"></div>
    </div>

    <div class="progress" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="foot">
        <span id="status">Ready</span>
        <span id="chunkInfo"></span>
    </div>

    <script>
        const ui = {
            input:       document.getElementById('textInput'),
            btnPlay:     document.getElementById('playBtn'),
            btnStop:     document.getElementById('stopBtn'),
            qrArea:      document.getElementById('qrDisplay'),
            qrContainer: document.getElementById('qrcode'),
            placeholder: document.getElementById('placeholder'),
            status:      document.getElementById('status'),
            info:        document.getElementById('chunkInfo'),
            progressBar: document.getElementById('progressBar'),
            progressFill:document.getElementById('progressFill'),
            settings: {
                chunk: document.getElementById('chunkSize'),
                speed: document.getElementById('displayTime'),
            }
        };

        const END_MARKER = '__QR_END__';
        const Phase = { START: 'START', DATA: 'DATA', END: 'END' };
        let state = { isTransmitting: false, timeoutId: null };

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = () => reject(new Error(`Failed to load ${src}`));
                document.head.appendChild(s);
            });
        }

        async function compressData(bytes) {
            if (typeof CompressionStream !== 'undefined') {
                const cs = new CompressionStream('deflate');
                const writer = cs.writable.getWriter();
                writer.write(bytes);
                writer.close();
                const reader = cs.readable.getReader();
                const chunks = [];
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                }
                const out = new Uint8Array(chunks.reduce((s, c) => s + c.length, 0));
                let off = 0;
                for (const c of chunks) { out.set(c, off); off += c.length; }
                return out;
            }
            if (typeof pako === 'undefined') {
                try { await loadScript('fallback/pako.min.js'); } catch (_) { /* not found */ }
            }
            if (typeof pako !== 'undefined') {
                return pako.deflate(bytes, { level: 9 });
            }
            throw new Error('No CompressionStream and pako.min.js not found in fallback/');
        }

        function splitIntoChunks(text, size) {
            const chunks = [];
            for (let i = 0; i < text.length; i += size)
                chunks.push(text.substring(i, i + size));
            return chunks;
        }

        function generateQR(text) {
            ui.qrContainer.innerHTML = '';
            try {
                new QRCode(ui.qrContainer, {
                    text, width: 420, height: 420,
                    colorDark: '#000', colorLight: '#fff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch {
                ui.status.textContent = '❌ QR failed - reduce chunk size';
                stopTransmission(false);
            }
        }

        async function startTransmission() {
            const rawText = ui.input.value.trim();
            if (!rawText) { ui.status.textContent = '⚠️ Nothing to send.'; return; }

            const useCompression = document.getElementById('compressEnabled').checked;
            const utf8Bytes = new TextEncoder().encode(rawText);

            let text;
            try {
                const bytes = useCompression ? await compressData(utf8Bytes) : utf8Bytes;
                let binary = '';
                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                text = btoa(binary);
            } catch (e) {
                ui.status.textContent = '❌ ' + e.message;
                return;
            }

            const chunkSize = parseInt(ui.settings.chunk.value) || 200;
            const speed     = parseInt(ui.settings.speed.value) || 500;
            const allChunks = splitIntoChunks(text, chunkSize);
            const totalChunks = allChunks.length;
            const queue = allChunks.map((chunk, i) => ({ chunk, seqNum: i + 1 }));

            state.isTransmitting = true;
            ui.placeholder.style.display = 'none';
            ui.qrContainer.style.display = 'block';
            ui.qrArea.classList.add('active');
            ui.progressBar.style.display = 'block';
            ui.btnPlay.disabled = true;
            ui.btnStop.disabled = false;
            ui.input.disabled = true;

            let phase = Phase.START;
            let idx = 0;

            const loopStep = () => {
                if (!state.isTransmitting) return;

                if (phase === Phase.START) {
                    const marker = useCompression
                        ? `__QR_START_COMP_${totalChunks}__`
                        : `__QR_START_${totalChunks}__`;
                    generateQR(marker);
                    ui.status.textContent = 'START';
                    ui.info.textContent = `0 / ${totalChunks} chunks`;
                    ui.progressFill.style.width = '0%';
                    phase = Phase.DATA;
                    state.timeoutId = setTimeout(loopStep, Math.max(1000, speed));
                    return;
                }

                if (phase === Phase.DATA && idx < queue.length) {
                    const { chunk, seqNum } = queue[idx];
                    generateQR(`${chunk}__QR_SEQ_${seqNum}__`);
                    const pct = (seqNum / totalChunks) * 100;
                    ui.progressFill.style.width = `${pct}%`;
                    ui.status.textContent = 'TX';
                    ui.info.textContent = `${seqNum} / ${totalChunks} chunks`;
                    idx++;
                    state.timeoutId = setTimeout(loopStep, speed);
                    return;
                }

                generateQR(END_MARKER);
                ui.status.textContent = 'END';
                ui.info.textContent = `${totalChunks} / ${totalChunks} chunks`;
                state.timeoutId = setTimeout(() => stopTransmission(true), speed + 200);
            };

            loopStep();
        }

        function stopTransmission(completed = false) {
            state.isTransmitting = false;
            clearTimeout(state.timeoutId);

            ui.qrArea.classList.remove('active');
            ui.placeholder.style.display = '';
            ui.qrContainer.style.display = 'none';
            ui.progressBar.style.display = 'none';
            ui.btnPlay.disabled = false;
            ui.btnStop.disabled = true;
            ui.input.disabled = false;

            ui.status.textContent = completed ? '✅ Done' : '⏹ Stopped';
            ui.info.textContent = '';
        }

        ui.btnPlay.addEventListener('click', () => startTransmission());
        ui.btnStop.addEventListener('click', () => stopTransmission(false));
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter' && !state.isTransmitting) ui.btnPlay.click();
        });
    </script>
</body>
</html>
